## 동작하는 코드 패턴

### ComponentSet 생성

```js
// 1. Component 개별 생성
const comp1 = figma.createComponent();
comp1.name = "상태=기본";
comp1.resize(120, 40);

const comp2 = figma.createComponent();
comp2.name = "상태=선택됨";
comp2.resize(120, 40);

// 2. ComponentSet으로 묶기
const cs = figma.combineAsVariants([comp1, comp2], figma.currentPage);
cs.name = "MyComponent";
cs.x = 100; cs.y = 100;
```

### Color Variable 바인딩

```js
// 변수 찾기
const collections = await figma.variables.getLocalVariableCollectionsAsync();
const allVars = await figma.variables.getLocalVariablesAsync();
const primaryVar = allVars.find(v => v.name === "Primary/Regular");

// fills에 바인딩
const paints = JSON.parse(JSON.stringify(node.fills));
paints[0].boundVariables = { color: { type: "VARIABLE_ALIAS", id: primaryVar.id } };
node.fills = paints;
```

### Text Style 바인딩

```js
// 스타일 찾기 (fontSize + weight로 매칭)
const styles = await figma.getLocalTextStylesAsync();
const style = styles.find(s => s.fontSize === 14 && s.name.includes("Regular"));

// 바인딩
await figma.loadFontAsync(node.fontName);
node.textStyleId = style.id;
```

### 아이콘 인스턴스 배치 (같은 파일 — getNodeById)

```js
// icon/Search node ID: "375:14"
const iconComp = figma.getNodeById("375:14");
const inst = iconComp.createInstance();
inst.resize(20, 20);
inst.x = padding;
inst.y = (parentHeight - 20) / 2;
parent.appendChild(inst);

// Vector fill → color variable 바인딩 필수
const allVars = await figma.variables.getLocalVariablesAsync();
const colorVar = allVars.find(v => v.name === "DS2_Text/secondary" && v.resolvedType === "COLOR");
inst.findAll(n => n.type === "VECTOR" && n.fills?.length > 0).forEach(vec => {
  const p = JSON.parse(JSON.stringify(vec.fills));
  p[0].boundVariables = { color: { type: "VARIABLE_ALIAS", id: colorVar.id } };
  vec.fills = p;
});
if (inst.fills?.length > 0) inst.fills = [];
```

