## 기존 컴포넌트 재사용 (필수)

아이콘이나 DS2 컴포넌트가 필요할 때 새로 그리지 않는다. 반드시 아래 방법으로 가져와 인스턴스를 배치한다.

### 같은 파일 내 컴포넌트 → `getNodeById` 사용

`importComponentByKeyAsync`는 **외부 라이브러리 전용**이다. 같은 파일(GXzbUcg1AtdzLi7XytKp1l) 내 아이콘·컴포넌트는 반드시 `getNodeById`로 직접 접근한다.

```js
// 같은 파일 아이콘 인스턴스 배치 (node ID 사용)
const iconComp = figma.getNodeById("371:21"); // icon/ChevronDown
const inst = iconComp.createInstance();
inst.resize(20, 20);
inst.x = x;
inst.y = y;
parent.insertChild(idx, inst);

// 아이콘 Vector fill에 color variable 바인딩
const allVars = await figma.variables.getLocalVariablesAsync();
const colorVar = allVars.find(v => v.name === "DS2_Text/tertiary" && v.resolvedType === "COLOR");
const vectors = inst.findAll(n => n.type === "VECTOR" && n.fills?.length > 0);
for (const vec of vectors) {
  const paints = JSON.parse(JSON.stringify(vec.fills));
  paints[0].boundVariables = { color: { type: "VARIABLE_ALIAS", id: colorVar.id } };
  vec.fills = paints;
}
// 아이콘 외부 FRAME fill 제거 (투명)
if (inst.fills?.length > 0) inst.fills = [];
```

오케스트레이터가 프롬프트에 사용할 컴포넌트 node ID를 명시해야 한다. ID 없이 새로 그리는 것은 금지한다.

