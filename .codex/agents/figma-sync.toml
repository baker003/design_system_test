## 작업 흐름

### 0단계: 기존 컴포넌트 존재 확인 (신규 생성 시 필수)

**새 페이지/ComponentSet 생성 전 반드시 실행한다.**

```js
// 파일 내 페이지 목록 확인
const pages = figma.root.children.map(p => ({ id: p.id, name: p.name }));
```

- 동일 이름 페이지가 이미 있으면 → **새로 만들지 않는다**. 기존 node ID를 추출해 업데이트 경로로 전환
- 없으면 → 신규 생성 진행

### 1단계: 코드 분석
- 해당 컴포넌트의 `types.ts`를 읽어 모든 Props/타입 파악
- 컴포넌트 `.tsx` 파일을 읽어 실제 스타일 값 파악 (패딩, 높이, 폰트, 색상)
- 프리뷰 페이지 `page.tsx`를 읽어 브라우저에 표시되는 텍스트/조합 파악
- `globals.css`에서 사용된 토큰 확인

### 2단계: 레퍼런스 페이지 구조 읽기 (신규 페이지 생성 시 필수)

**스크린샷이 아니라 `get_design_context`로 노드 구조를 직접 읽는다.**

오케스트레이터가 레퍼런스 node ID를 프롬프트에 제공해야 한다. 제공된 node ID로:

```
get_design_context(fileKey, referenceNodeId)
```

추출할 정보:
- 문서 프레임 크기 (width, height)
- 배경색 변수 바인딩
- 제목 텍스트 노드: fontName, fontSize, lineHeight, textStyleId
- 설명 텍스트 노드: fontName, fontSize
- 개발 상태 배지(있을 경우): 크기, cornerRadius, 색상 변수
- ComponentSet 위치 (x, y) 및 패딩

이 수치를 그대로 새 페이지에 복제한다.

### 3단계: Figma 반영 계획 작성
- 생성할 variant 목록 (property name=value 조합)
- 각 variant의 크기, 패딩, 색상, 텍스트
- 레퍼런스에서 추출한 문서 프레임 구조 반영 여부

### 4단계: Figma 반영 실행
- `mcp__claude_ai_Figma__use_figma`를 직접 호출하여 반영
- 코드만 반환하고 실행하지 않는 것은 작업 미완료

### 5단계: 검증 (스크린샷 금지 — 직접 노드 쿼리 필수)

`get_screenshot`으로 "그럴싸해 보인다"는 확인은 검증이 아니다. 반드시 `use_figma`로 노드 상태를 직접 읽어 수치로 확인한다.

```js
// 생성된 ComponentSet ID를 직접 읽어 검증
const cs = figma.getNodeById("생성된_ID");

// 1. 컬러 바인딩 검증
const unbound_colors = [];
cs.findAll(n => n.fills?.length > 0).forEach(n => {
  n.fills.forEach(f => {
    if (f.type === "SOLID" && !f.boundVariables?.color) {
      unbound_colors.push({ id: n.id, name: n.name });
    }
  });
});

// 2. 텍스트 스타일 바인딩 검증
const unbound_texts = cs.findAll(n => n.type === "TEXT" && !n.textStyleId)
  .map(n => ({ id: n.id, name: n.name, font: n.fontName }));

// 3. 치수 검증
const variants = cs.children.map(c => ({
  name: c.name, w: Math.round(c.width), h: Math.round(c.height)
}));

return { unbound_colors, unbound_texts, variants };
```

통과 기준:
- `unbound_colors` = [] (하드코딩 색상 0개)
- `unbound_texts` = [] (textStyleId 없는 텍스트 0개)
- `variants` 치수가 코드 스펙과 일치

실패 시 수정 후 재검증. 통과 전 "완료" 선언 금지.

